<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מוצרלה מחדש</title>
  <style>
    :root {
      --bg: #f3f7ff;
      --panel: #ffffff;
      --line: #dbe6f5;
      --text: #172033;
      --muted: #5b677d;
      --primary: #2563eb;
      --danger: #dc2626;
      --success: #166534;
      --radius: 18px;
      --shadow: 0 18px 42px rgba(37, 99, 235, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Heebo, Arial, sans-serif;
      background: linear-gradient(180deg, #eef4ff, #f8fbff);
      color: var(--text);
    }
    .wrap { max-width: 1220px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; gap: 16px; }
    .auth, .panel, .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .auth { max-width: 520px; margin: 48px auto; padding: 24px; }
    .panel { padding: 18px; margin-bottom: 18px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    h1, h2, h3, h4, p { margin-top: 0; }
    .muted { color: var(--muted); }
    .row { display: grid; gap: 12px; }
    .row-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .row-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .row-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    input, textarea, select, button {
      font: inherit;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid #cfd8e7;
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    textarea { min-height: 100px; resize: vertical; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      background: #e8efff;
      color: var(--text);
      font-weight: 700;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger { background: #fee2e2; color: #991b1b; }
    .btn-outline { background: #fff; border: 1px solid #cfd8e7; }
    .cards { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .card { overflow: hidden; }
    .card img { width: 100%; height: 220px; object-fit: cover; background: #edf2ff; }
    .card-body { padding: 15px; display: grid; gap: 10px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: #294b8f;
      font-size: .84rem;
    }
    .hidden { display: none !important; }
    .code {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      direction: ltr;
      text-align: left;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .9rem;
    }
    .ok { color: var(--success); }
    .error { color: var(--danger); }
    @media (max-width: 900px) {
      .cards, .row-4, .row-3, .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section id="authSection" class="auth">
      <h1>מוצרלה מחדש</h1>
      <p class="muted">מערכת בסיסית, מסודרת ויציבה: משתמשים, מוצרים, עיצוב, פרסום JSON, וקוד הטמעה.</p>
      <div class="row">
        <input id="email" type="email" placeholder="אימייל" />
        <input id="password" type="password" placeholder="סיסמה" />
        <div class="row row-2">
          <button id="loginBtn" class="btn-primary">התחברות</button>
          <button id="registerBtn" class="btn-outline">הרשמה</button>
        </div>
      </div>
      <p id="authStatus" class="muted" style="margin-top:12px"></p>
    </section>

    <section id="appSection" class="hidden">
      <div class="topbar">
        <div>
          <h2>ניהול מוצרים</h2>
          <div class="muted" id="userLine"></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button id="rebuildBtn" class="btn-outline">בנה מחדש JSON</button>
          <button id="logoutBtn" class="btn-danger">התנתק</button>
        </div>
      </div>

      <div class="panel">
        <h3>פרטי חיבור</h3>
        <div class="row row-2">
          <div>
            <label>Client ID</label>
            <input id="clientId" readonly />
          </div>
          <div>
            <label>Public API</label>
            <input id="publicApiUrl" readonly />
          </div>
        </div>
        <div style="margin-top:12px">
          <label>קוד Embed</label>
          <div class="code" id="embedCode"></div>
        </div>
      </div>

      <div class="panel">
        <h3>עיצוב כללי</h3>
        <div class="row row-4">
          <div><label>כותרת Embed</label><input id="themeEmbedTitle" value="המוצרים שלנו" /></div>
          <div><label>צבע ראשי</label><input id="themePrimaryColor" type="color" value="#60a5fa" /></div>
          <div><label>צבע כפתור</label><input id="themeButtonColor" type="color" value="#111827" /></div>
          <div><label>צבע טקסט</label><input id="themeTextColor" type="color" value="#111827" /></div>
        </div>
        <div class="row row-3" style="margin-top:12px">
          <div><label>צבע כרטיס</label><input id="themeCardBackground" type="color" value="#ffffff" /></div>
          <div><label>עמודות במחשב</label><input id="themeDesktopColumns" type="number" min="1" max="6" value="4" /></div>
          <div><label>עמודות במובייל</label><input id="themeMobileColumns" type="number" min="1" max="3" value="2" /></div>
        </div>
        <div style="margin-top:12px"><button id="saveThemeBtn" class="btn-primary">שמור עיצוב</button></div>
      </div>

      <div class="panel">
        <h3>מוצר חדש / עריכה</h3>
        <div class="row row-3">
          <div><label>ID מוצר</label><input id="productId" placeholder="premium-box" /></div>
          <div><label>שם מוצר</label><input id="productName" placeholder="מארז פרימיום" /></div>
          <div><label>מחיר</label><input id="productPrice" type="number" min="0" step="0.01" placeholder="129" /></div>
        </div>
        <div class="row row-3" style="margin-top:12px">
          <div><label>מחיר מבצע</label><input id="productSalePrice" type="number" min="0" step="0.01" placeholder="99" /></div>
          <div><label>תמונה</label><input id="productImageFile" type="file" accept="image/*" /></div>
          <div><label>או URL לתמונה</label><input id="productImageUrl" placeholder="https://..." /></div>
        </div>
        <div class="row row-2" style="margin-top:12px">
          <div><label>תגים (מופרד בפסיקים)</label><input id="productTags" placeholder="חדש, פופולרי" /></div>
          <div><label>צבעים (מופרד בפסיקים)</label><input id="productColors" placeholder="שחור, כחול" /></div>
        </div>
        <div style="margin-top:12px"><label>תיאור</label><textarea id="productDescription"></textarea></div>
        <div class="row row-2" style="margin-top:12px">
          <div><label>תוספות JSON</label><textarea id="productAddons" placeholder='[{"type":"promo","label":"20% הנחה"}]'></textarea></div>
          <div><label>וריאציות JSON</label><textarea id="productVariants" placeholder='[{"name":"מידה","options":["S","M","L"]}]'></textarea></div>
        </div>
        <div class="row row-4" style="margin-top:12px">
          <div><label>צבע הדגשה</label><input id="productAccentColor" type="color" value="#60a5fa" /></div>
          <div><label>רקע כרטיס</label><input id="productCardBackground" type="color" value="#ffffff" /></div>
          <div><label>פורסם</label><select id="productPublished"><option value="true">כן</option><option value="false">לא</option></select></div>
          <div><label>פעיל</label><select id="productActive"><option value="true">כן</option><option value="false">לא</option></select></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
          <button id="saveProductBtn" class="btn-primary">שמור מוצר</button>
          <button id="resetFormBtn" class="btn-outline">נקה טופס</button>
        </div>
      </div>

      <div class="panel">
        <h3>המוצרים שלי</h3>
        <div id="productsGrid" class="cards"></div>
        <p id="emptyProducts" class="muted hidden">עדיין אין מוצרים.</p>
      </div>

      <div class="panel">
        <h3>סטטוס</h3>
        <div id="statusLine" class="muted">מוכן.</div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
    import { getFirestore, doc, getDoc, getDocs, setDoc, collection, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
    import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-functions.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js';

    const firebaseConfig = {
      apiKey: 'PUT_YOUR_API_KEY_HERE',
      authDomain: 'PUT_YOUR_AUTH_DOMAIN_HERE',
      projectId: 'PUT_YOUR_PROJECT_ID_HERE',
      storageBucket: 'PUT_YOUR_STORAGE_BUCKET_HERE',
      messagingSenderId: 'PUT_YOUR_MESSAGING_SENDER_ID_HERE',
      appId: 'PUT_YOUR_APP_ID_HERE'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const functions = getFunctions(app, 'us-central1');

    const state = {
      user: null,
      clientId: '',
      apiUrl: '',
      products: [],
      editingId: null
    };

    const $ = (selector) => document.querySelector(selector);

    function setStatus(message, isError = false) {
      const el = $('#statusLine');
      const authEl = $('#authStatus');
      if (el) {
        el.textContent = message;
        el.className = isError ? 'error' : 'muted';
      }
      if (authEl) {
        authEl.textContent = message;
        authEl.className = isError ? 'error' : 'muted';
      }
    }

    function parseJsonSafe(text, fallback = []) {
      if (!text.trim()) return fallback;
      try {
        return JSON.parse(text);
      } catch {
        throw new Error('JSON לא תקין בתוספות או בווריאציות');
      }
    }

    async function uploadImageIfNeeded(uid, productId) {
      const file = $('#productImageFile').files?.[0];
      if (!file) return $('#productImageUrl').value.trim();
      const storageRef = ref(storage, `users/${uid}/products/${productId}/${Date.now()}-${file.name}`);
      await uploadBytes(storageRef, file);
      return await getDownloadURL(storageRef);
    }

    function fillTheme(theme = {}) {
      $('#themeEmbedTitle').value = theme.embedTitle || 'המוצרים שלנו';
      $('#themePrimaryColor').value = theme.primaryColor || '#60a5fa';
      $('#themeButtonColor').value = theme.buttonColor || '#111827';
      $('#themeTextColor').value = theme.textColor || '#111827';
      $('#themeCardBackground').value = theme.cardBackground || '#ffffff';
      $('#themeDesktopColumns').value = theme.desktopColumns || 4;
      $('#themeMobileColumns').value = theme.mobileColumns || 2;
    }

    async function loadTheme(uid) {
      const snap = await getDoc(doc(db, `users/${uid}/storefront/settings`));
      fillTheme(snap.exists() ? snap.data() : {});
    }

    function renderEmbedCode() {
      const code = `<div id="storefront-root"></div>\n<script>\nfetch('${state.apiUrl}')\n  .then(r => r.json())\n  .then(data => console.log(data));\n<\/script>`;
      $('#embedCode').textContent = code;
      $('#publicApiUrl').value = state.apiUrl;
      $('#clientId').value = state.clientId;
    }

    async function initStorefront() {
      const fn = httpsCallable(functions, 'initStorefront');
      const result = await fn({});
      state.clientId = result.data.clientId;
      state.apiUrl = `${location.origin}/storefrontApi?clientId=${encodeURIComponent(state.clientId)}`;
      renderEmbedCode();
    }

    async function loadProducts(uid) {
      const q = query(collection(db, `users/${uid}/products`), orderBy('updatedAt', 'desc'));
      const snap = await getDocs(q);
      state.products = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      renderProducts();
    }

    function renderProducts() {
      const grid = $('#productsGrid');
      const empty = $('#emptyProducts');
      if (!state.products.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = state.products.map((item) => `
        <article class="card">
          <img src="${item.imageUrl || ''}" alt="${item.name || ''}" />
          <div class="card-body">
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
              <strong>${item.name || ''}</strong>
              <span class="chip">${Number(item.price || 0)} ₪</span>
            </div>
            <div class="muted">${item.description || ''}</div>
            <div class="chips">${(item.tags || []).map((tag) => `<span class="chip">${typeof tag === 'string' ? tag : tag.label}</span>`).join('')}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn-outline" data-edit="${item.id}">ערוך</button>
            </div>
          </div>
        </article>
      `).join('');

      grid.querySelectorAll('[data-edit]').forEach((btn) => {
        btn.addEventListener('click', () => startEdit(btn.dataset.edit));
      });
    }

    function startEdit(id) {
      const item = state.products.find((p) => p.id === id);
      if (!item) return;
      state.editingId = id;
      $('#productId').value = item.id || '';
      $('#productName').value = item.name || '';
      $('#productPrice').value = item.price ?? '';
      $('#productSalePrice').value = item.salePrice ?? '';
      $('#productImageUrl').value = item.imageUrl || '';
      $('#productTags').value = (item.tags || []).map((t) => typeof t === 'string' ? t : t.label).join(', ');
      $('#productColors').value = (item.colors || []).join(', ');
      $('#productDescription').value = item.description || '';
      $('#productAddons').value = JSON.stringify(item.addons || [], null, 2);
      $('#productVariants').value = JSON.stringify(item.variants || [], null, 2);
      $('#productAccentColor').value = item.accentColor || '#60a5fa';
      $('#productCardBackground').value = item.cardBackground || '#ffffff';
      $('#productPublished').value = String(item.published === true);
      $('#productActive').value = String(item.active !== false);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      state.editingId = null;
      $('#productId').value = '';
      $('#productName').value = '';
      $('#productPrice').value = '';
      $('#productSalePrice').value = '';
      $('#productImageFile').value = '';
      $('#productImageUrl').value = '';
      $('#productTags').value = '';
      $('#productColors').value = '';
      $('#productDescription').value = '';
      $('#productAddons').value = '';
      $('#productVariants').value = '';
      $('#productAccentColor').value = '#60a5fa';
      $('#productCardBackground').value = '#ffffff';
      $('#productPublished').value = 'true';
      $('#productActive').value = 'true';
    }

    async function saveTheme() {
      const fn = httpsCallable(functions, 'saveTheme');
      await fn({
        embedTitle: $('#themeEmbedTitle').value.trim(),
        primaryColor: $('#themePrimaryColor').value,
        buttonColor: $('#themeButtonColor').value,
        textColor: $('#themeTextColor').value,
        cardBackground: $('#themeCardBackground').value,
        desktopColumns: Number($('#themeDesktopColumns').value || 4),
        mobileColumns: Number($('#themeMobileColumns').value || 2)
      });
      setStatus('העיצוב נשמר');
    }

    async function saveProduct() {
      if (!state.user) return;
      const id = $('#productId').value.trim();
      if (!id) {
        setStatus('חסר ID מוצר', true);
        return;
      }
      try {
        const imageUrl = await uploadImageIfNeeded(state.user.uid, id);
        const fn = httpsCallable(functions, 'saveProduct');
        await fn({
          id,
          name: $('#productName').value.trim(),
          price: Number($('#productPrice').value || 0),
          salePrice: $('#productSalePrice').value.trim() ? Number($('#productSalePrice').value) : null,
          imageUrl,
          description: $('#productDescription').value.trim(),
          tags: $('#productTags').value.split(',').map((v) => v.trim()).filter(Boolean),
          colors: $('#productColors').value.split(',').map((v) => v.trim()).filter(Boolean),
          addons: parseJsonSafe($('#productAddons').value, []),
          variants: parseJsonSafe($('#productVariants').value, []),
          accentColor: $('#productAccentColor').value,
          cardBackground: $('#productCardBackground').value,
          published: $('#productPublished').value === 'true',
          active: $('#productActive').value === 'true'
        });
        await loadProducts(state.user.uid);
        await initStorefront();
        resetForm();
        setStatus('המוצר נשמר');
      } catch (error) {
        setStatus(error.message || 'שמירת המוצר נכשלה', true);
      }
    }

    async function bootApp(user) {
      state.user = user;
      $('#authSection').classList.add('hidden');
      $('#appSection').classList.remove('hidden');
      $('#userLine').textContent = `${user.email} · UID: ${user.uid}`;
      await Promise.all([loadTheme(user.uid), loadProducts(user.uid), initStorefront()]);
      setStatus('המערכת מחוברת ומעודכנת');
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        await bootApp(user);
      } else {
        state.user = null;
        $('#authSection').classList.remove('hidden');
        $('#appSection').classList.add('hidden');
      }
    });

    $('#loginBtn').addEventListener('click', async () => {
      try {
        await signInWithEmailAndPassword(auth, $('#email').value.trim(), $('#password').value);
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    $('#registerBtn').addEventListener('click', async () => {
      try {
        await createUserWithEmailAndPassword(auth, $('#email').value.trim(), $('#password').value);
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    $('#logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
    });

    $('#saveThemeBtn').addEventListener('click', saveTheme);
    $('#saveProductBtn').addEventListener('click', saveProduct);
    $('#resetFormBtn').addEventListener('click', resetForm);
    $('#rebuildBtn').addEventListener('click', async () => {
      try {
        const fn = httpsCallable(functions, 'rebuildStorefront');
        await fn({});
        await initStorefront();
        setStatus('הקבצים נבנו מחדש');
      } catch (error) {
        setStatus(error.message, true);
      }
    });
  </script>
</body>
</html>
